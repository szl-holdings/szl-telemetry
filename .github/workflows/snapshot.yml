name: daily-telemetry-snapshot
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Take snapshot
        run: python3 scripts/snapshot.py
      - name: Commit if changed
        run: |
          git config user.name "szl-telemetry-bot"
          git config user.email "szl-telemetry-bot@users.noreply.github.com"
          git add -A data README.md
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -s -m "telemetry: daily snapshot $(date -u +%F)"
          git push
