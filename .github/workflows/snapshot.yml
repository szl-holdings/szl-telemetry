name: daily-telemetry-snapshot
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Snapshot into telemetry-data branch
        run: |
          git fetch origin telemetry-data:telemetry-data || git branch telemetry-data "$(git commit-tree "$(git hash-object -t tree /dev/null)" -m 'init telemetry-data (empty root)')"
          git worktree add ../tdata telemetry-data
          python3 scripts/snapshot.py --outdir ../tdata
          cd ../tdata
          git config user.name "szl-telemetry-bot"
          git config user.email "szl-telemetry-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "no change"; exit 0; fi
          git commit -s -m "telemetry: daily snapshot $(date -u +%F)"
          git push origin telemetry-data
